<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Legal_Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ═══════════════════════════════
       THEME VARIABLES
    ═══════════════════════════════ */
    :root {
      --accent:        #4f46e5;
      --accent-hover:  #4338ca;
      --accent-soft:   #ede9fe;
      --accent-text:   #4f46e5;
      --bg-body:       #dde4f0;
      --bg-app:        #f2f5fc;
      --bg-sidebar:    #ffffff;
      --bg-card:       #ffffff;
      --bg-input:      #ffffff;
      --bg-hover:      #f3f4f6;
      --text-primary:  #111827;
      --text-secondary:#6b7280;
      --text-muted:    #9ca3af;
      --border:        #e5e7eb;
      --border-light:  #f0f0f0;
      --scrollbar:     #d1d5db;
      --dot-color:     #9ca3af;
      --chip-bg:       #ffffff;
      --chip-border:   #e5e7eb;
      --msg-bot-label: #4f46e5;
      --sidebar-toggle-bg: #f3f4f6;
    }

    [data-theme="dark"] {
      --accent:        #818cf8;
      --accent-hover:  #6366f1;
      --accent-soft:   #1e1b4b;
      --accent-text:   #a5b4fc;
      --bg-body:       #0f0f17;
      --bg-app:        #13131f;
      --bg-sidebar:    #1a1a2e;
      --bg-card:       #1e1e30;
      --bg-input:      #1e1e30;
      --bg-hover:      #252538;
      --text-primary:  #e5e7eb;
      --text-secondary:#9ca3af;
      --text-muted:    #6b7280;
      --border:        #2e2e45;
      --border-light:  #252538;
      --scrollbar:     #2e2e45;
      --dot-color:     #6b7280;
      --chip-bg:       #1e1e30;
      --chip-border:   #2e2e45;
      --msg-bot-label: #a5b4fc;
      --sidebar-toggle-bg: #252538;
    }

    [data-theme="midnight"] {
      --accent:        #38bdf8;
      --accent-hover:  #0ea5e9;
      --accent-soft:   #0c2a3e;
      --accent-text:   #38bdf8;
      --bg-body:       #020617;
      --bg-app:        #040d1a;
      --bg-sidebar:    #060f1f;
      --bg-card:       #0a1628;
      --bg-input:      #0a1628;
      --bg-hover:      #0f1e38;
      --text-primary:  #dbeafe;
      --text-secondary:#93c5fd;
      --text-muted:    #4b6a9a;
      --border:        #132040;
      --border-light:  #0f1e38;
      --scrollbar:     #132040;
      --dot-color:     #4b6a9a;
      --chip-bg:       #0a1628;
      --chip-border:   #132040;
      --msg-bot-label: #38bdf8;
      --sidebar-toggle-bg: #0f1e38;
    }

    [data-theme="forest"] {
      --accent:        #059669;
      --accent-hover:  #047857;
      --accent-soft:   #d1fae5;
      --accent-text:   #059669;
      --bg-body:       #e8f5ef;
      --bg-app:        #f0faf5;
      --bg-sidebar:    #ffffff;
      --bg-card:       #ffffff;
      --bg-input:      #ffffff;
      --bg-hover:      #f0fdf4;
      --text-primary:  #064e3b;
      --text-secondary:#374151;
      --text-muted:    #9ca3af;
      --border:        #d1fae5;
      --border-light:  #e8f5ef;
      --scrollbar:     #a7f3d0;
      --dot-color:     #9ca3af;
      --chip-bg:       #ffffff;
      --chip-border:   #d1fae5;
      --msg-bot-label: #059669;
      --sidebar-toggle-bg: #f0fdf4;
    }

    [data-theme="sepia"] {
      --accent:        #92400e;
      --accent-hover:  #78350f;
      --accent-soft:   #fef3c7;
      --accent-text:   #92400e;
      --bg-body:       #ede0cc;
      --bg-app:        #faf3e8;
      --bg-sidebar:    #fffaf4;
      --bg-card:       #fffaf4;
      --bg-input:      #fffaf4;
      --bg-hover:      #fef9f0;
      --text-primary:  #2f241b;
      --text-secondary:#7c6657;
      --text-muted:    #a89888;
      --border:        #e8d8c4;
      --border-light:  #f0e8d8;
      --scrollbar:     #d8c8b4;
      --dot-color:     #a89888;
      --chip-bg:       #fffaf4;
      --chip-border:   #e8d8c4;
      --msg-bot-label: #92400e;
      --sidebar-toggle-bg: #fef9f0;
    }

    /* ═══════════════════════════════
       BASE
    ═══════════════════════════════ */
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s;
    }

    .app {
      width: 100%;
      max-width: 1300px;
      height: 92vh;
      background: var(--bg-app);
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      box-shadow: 0 8px 48px rgba(0,0,0,0.16);
      transition: background 0.3s;
      position: relative;
    }

    /* ═══════════════════════════════
       SIDEBAR
    ═══════════════════════════════ */
    .sidebar {
      width: 272px;
      min-width: 272px;
      background: var(--bg-sidebar);
      border-radius: 28px 0 0 28px;
      display: flex;
      flex-direction: column;
      padding: 22px 14px 18px;
      transition: width 0.28s cubic-bezier(.4,0,.2,1),
                  min-width 0.28s cubic-bezier(.4,0,.2,1),
                  opacity 0.2s,
                  padding 0.28s,
                  background 0.3s;
      overflow: hidden;
      border-right: 1px solid var(--border-light);
    }

    .sidebar.collapsed {
      width: 0;
      min-width: 0;
      padding-left: 0;
      padding-right: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* brand row */
    .brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 6px 18px;
      white-space: nowrap;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 12px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .brand-icon svg { width: 22px; height: 22px; }

    .brand-name {
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: var(--text-primary);
    }

    /* new chat btn */
    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
      margin-bottom: 18px;
      white-space: nowrap;
      font-family: inherit;
    }

    .new-chat-btn:hover { background: var(--accent-hover); }
    .new-chat-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* convo list */
    .convo-label {
      font-size: 0.71rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 8px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      white-space: nowrap;
    }

    .clear-all-btn {
      background: none;
      border: none;
      color: var(--accent-text);
      font-size: 0.72rem;
      cursor: pointer;
      font-weight: 500;
      font-family: inherit;
    }

    .convo-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .convo-list::-webkit-scrollbar { width: 3px; }
    .convo-list::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

    .convo-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.83rem;
      transition: background 0.12s;
      white-space: nowrap;
      overflow: hidden;
    }

    .convo-item:hover { background: var(--bg-hover); }
    .convo-item.active { background: var(--accent-soft); color: var(--accent-text); font-weight: 600; }
    .convo-item svg { flex-shrink: 0; width: 14px; height: 14px; opacity: 0.55; }
    .convo-item.active svg { opacity: 1; }
    .convo-item span { overflow: hidden; text-overflow: ellipsis; }

    /* sidebar footer */
    .sidebar-footer {
      border-top: 1px solid var(--border-light);
      padding-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sf-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.83rem;
      color: var(--text-secondary);
      transition: background 0.12s;
      white-space: nowrap;
    }

    .sf-item:hover { background: var(--bg-hover); }
    .sf-item svg { width: 16px; height: 16px; opacity: 0.55; }

    .user-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--accent-soft);
      display: grid;
      place-items: center;
      font-size: 0.68rem;
      font-weight: 800;
      color: var(--accent-text);
      flex-shrink: 0;
    }

    /* ═══════════════════════════════
       TOPBAR (toggle + theme)
    ═══════════════════════════════ */
    .main {
      flex: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      background: var(--bg-app);
      border-radius: 0 28px 28px 0;
      transition: background 0.3s;
      min-width: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border-light);
      gap: 12px;
      background: var(--bg-sidebar);
      transition: background 0.3s, border-color 0.3s;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toggle-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--sidebar-toggle-bg);
      border: 1px solid var(--border);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .toggle-btn:hover { background: var(--bg-hover); }
    .toggle-btn svg { width: 18px; height: 18px; stroke: var(--text-secondary); }

    .topbar-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar-title svg { width: 20px; height: 20px; stroke: var(--accent); }

    /* theme switcher */
    .theme-pills {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .theme-pill {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .theme-pill:hover { transform: scale(1.15); }
    .theme-pill.active { border-color: var(--text-primary); transform: scale(1.1); }

    .tp-light    { background: #dde4f0; }
    .tp-dark     { background: #1a1a2e; }
    .tp-midnight { background: #020617; }
    .tp-forest   { background: #d1fae5; }
    .tp-sepia    { background: #ede0cc; }

    .theme-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-right: 2px;
    }

    /* ═══════════════════════════════
       CHAT AREA
    ═══════════════════════════════ */
    .chat-area {
      overflow-y: auto;
      padding: 28px 36px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      transition: background 0.3s;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

    /* welcome */
    .welcome {
      margin: auto;
      text-align: center;
      max-width: 560px;
      padding: 50px 20px;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      background: var(--accent);
      border-radius: 20px;
      display: grid;
      place-items: center;
      margin: 0 auto 22px;
    }

    .welcome-icon svg { width: 36px; height: 36px; }

    .welcome h2 {
      font-size: 1.55rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .welcome p {
      color: var(--text-secondary);
      font-size: 0.93rem;
      line-height: 1.65;
    }

    .chips {
      margin-top: 22px;
      display: flex;
      gap: 9px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .chip {
      padding: 9px 15px;
      border-radius: 999px;
      border: 1px solid var(--chip-border);
      background: var(--chip-bg);
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.82rem;
      font-weight: 500;
      transition: box-shadow 0.15s, transform 0.15s, background 0.15s;
      font-family: inherit;
    }

    .chip:hover {
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      transform: translateY(-1px);
      background: var(--accent-soft);
      color: var(--accent-text);
    }

    /* messages */
    .message {
      display: flex;
      flex-direction: column;
      gap: 5px;
      animation: fadeIn 0.22s ease;
    }

    .msg-header {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-size: 0.68rem;
      font-weight: 800;
    }

    .message.user .msg-avatar { background: var(--accent-soft); color: var(--accent-text); }
    .message.bot  .msg-avatar { background: var(--accent); color: #fff; }

    .msg-avatar svg { width: 16px; height: 16px; }

    .msg-sender {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .message.user .msg-body {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 12px 16px;
      font-size: 0.91rem;
      color: var(--text-primary);
      line-height: 1.65;
      margin-left: 39px;
      border: 1px solid var(--border);
      transition: background 0.3s;
    }

    .bot-label {
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--msg-bot-label);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-left: 39px;
    }

    .label-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
    }

    .message.bot .msg-body {
      background: transparent;
      font-size: 0.91rem;
      color: var(--text-primary);
      line-height: 1.7;
      margin-left: 39px;
      white-space: pre-wrap;
    }

    /* typing */
    .typing-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeIn 0.2s ease;
    }

    .typing-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
      background: var(--bg-card);
      border-radius: 14px;
      border: 1px solid var(--border);
      margin-left: 0;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--dot-color);
      border-radius: 50%;
      animation: bounce 1.1s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }

    /* ═══════════════════════════════
       COMPOSER
    ═══════════════════════════════ */
    .composer {
      padding: 14px 36px 22px;
      background: var(--bg-app);
      transition: background 0.3s;
    }

    .composer-inner {
      background: var(--bg-input);
      border-radius: 999px;
      display: flex;
      align-items: center;
      padding: 7px 7px 7px 20px;
      gap: 10px;
      border: 1px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
    }

    .composer-inner:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
    }

    .composer-inner textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      font: inherit;
      font-size: 0.91rem;
      color: var(--text-primary);
      background: transparent;
      line-height: 1.5;
      min-height: 36px;
      max-height: 140px;
    }

    .composer-inner textarea::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .send-btn:hover { background: var(--accent-hover); transform: scale(1.06); }
    .send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 17px; height: 17px; }

    .hint-row {
      margin-top: 7px;
      text-align: center;
      font-size: 0.73rem;
      color: var(--text-muted);
    }

    /* ═══════════════════════════════
       ANIMATIONS
    ═══════════════════════════════ */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40%           { transform: translateY(-5px); opacity: 1; }
    }

    /* ═══════════════════════════════
       RESPONSIVE
    ═══════════════════════════════ */
    @media (max-width: 700px) {
      body { padding: 0; }
      .app { border-radius: 0; height: 100vh; max-width: 100%; }
      .main { border-radius: 0; }
      .chat-area, .composer { padding-left: 14px; padding-right: 14px; }
      .topbar { padding: 12px 14px; }
      .theme-label { display: none; }
    }
  </style>
</head>
<body>
<div class="app" id="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    <div class="brand-row">
      <div class="brand-icon">
        <!-- Scales of Justice SVG -->
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="3" x2="12" y2="20"/>
          <path d="M5 20h14"/>
          <path d="M4 7l4 6H4L8 7z" fill="white" fill-opacity="0.3"/>
          <path d="M16 7l4 6h-4l4-6z" fill="white" fill-opacity="0.3"/>
          <line x1="4" y1="7" x2="20" y2="7"/>
          <line x1="8" y1="3" x2="16" y2="3"/>
        </svg>
      </div>
      <span class="brand-name">Legal_Chatbot</span>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg fill="none" stroke="white" stroke-width="2.2" viewBox="0 0 24 24">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Chat
    </button>

    <div class="convo-label">
      Conversations
      <button class="clear-all-btn" id="clearAllBtn">Clear All</button>
    </div>

    <div class="convo-list" id="convoList">
      <div class="convo-item active" id="initConvo">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>New Conversation</span>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="sf-item">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Settings
      </div>
      <div class="sf-item">
        <div class="user-dot">U</div>
        User
      </div>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-left">
        <button class="toggle-btn" id="toggleSidebar" title="Toggle sidebar">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="topbar-title">
          <!-- Scales of Justice small -->
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="3" x2="12" y2="20"/>
            <path d="M5 20h14"/>
            <path d="M4 7l4 6H4L8 7z"/>
            <path d="M16 7l4 6h-4l4-6z"/>
            <line x1="4" y1="7" x2="20" y2="7"/>
            <line x1="8" y1="3" x2="16" y2="3"/>
          </svg>
          Legal_Chatbot
        </div>
      </div>

      <div class="theme-pills" id="themePills">
        <span class="theme-label">Theme:</span>
        <div class="theme-pill tp-light    active" data-theme="light"    title="Light"></div>
        <div class="theme-pill tp-dark"            data-theme="dark"     title="Dark"></div>
        <div class="theme-pill tp-midnight"        data-theme="midnight" title="Midnight"></div>
        <div class="theme-pill tp-forest"          data-theme="forest"   title="Forest"></div>
        <div class="theme-pill tp-sepia"           data-theme="sepia"    title="Sepia"></div>
      </div>
    </div>

    <!-- CHAT -->
    <div class="chat-area" id="chatArea">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <!-- Scales of Justice large -->
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="3" x2="12" y2="20"/>
            <path d="M5 20h14"/>
            <path d="M4 7l4 6H4L8 7z" fill="white" fill-opacity="0.4"/>
            <path d="M16 7l4 6h-4l4-6z" fill="white" fill-opacity="0.4"/>
            <line x1="4" y1="7" x2="20" y2="7"/>
            <line x1="8" y1="3" x2="16" y2="3"/>
          </svg>
        </div>
        <h2>Ask a legal question</h2>
        <p>The assistant answers only from the indexed Pakistani legal dataset. English and Urdu queries are both supported.</p>
        <div class="chips">
          <button class="chip" data-q="What limitations are imposed on freedom of expression?">Freedom of expression</button>
          <button class="chip" data-q="آزادیِ اظہار پر کون سی پابندیاں عائد کی گئی ہیں؟">Urdu legal query</button>
          <button class="chip" data-q="What is the procedure for filing a petition?">Filing a petition</button>
          <button class="chip" data-q="What are the fundamental rights in Pakistan's constitution?">Fundamental rights</button>
        </div>
      </div>
    </div>

    <!-- COMPOSER -->
    <div class="composer">
      <div class="composer-inner">
        <textarea id="messageInput" placeholder="Type your legal question here..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Send message">
          <svg fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2" fill="white"/>
          </svg>
        </button>
      </div>
      <div class="hint-row">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
    </div>
  </main>
</div>

<script>
  /* ─────────────────────────────
     ELEMENTS
  ───────────────────────────── */
  const chatArea = document.getElementById('chatArea');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const convoList = document.getElementById('convoList');
  const newChatBtn = document.getElementById('newChatBtn');
  const clearAllBtn = document.getElementById('clearAllBtn');
  const toggleSidebar = document.getElementById('toggleSidebar');
  const sidebar = document.getElementById('sidebar');
  const htmlEl = document.documentElement;

  let convoCount = 0;
  let sidebarOpen = true;
  let isSending = false;
  let currentController = null;

  /* ─────────────────────────────
     THEME SYSTEM
  ───────────────────────────── */
  const savedTheme = localStorage.getItem('lc_theme') || 'light';
  applyTheme(savedTheme);

  document.getElementById('themePills').addEventListener('click', (e) => {
    const pill = e.target.closest('.theme-pill');
    if (!pill) return;

    applyTheme(pill.dataset.theme);
    localStorage.setItem('lc_theme', pill.dataset.theme);
  });

  function applyTheme(theme) {
    htmlEl.setAttribute('data-theme', theme);

    document.querySelectorAll('.theme-pill').forEach((pill) => {
      pill.classList.toggle('active', pill.dataset.theme === theme);
    });
  }

  /* ─────────────────────────────
     SIDEBAR
  ───────────────────────────── */
  toggleSidebar.addEventListener('click', () => {
    sidebarOpen = !sidebarOpen;
    sidebar.classList.toggle('collapsed', !sidebarOpen);
  });

  /* ─────────────────────────────
     HELPERS
  ───────────────────────────── */
  function scrollBottom(smooth = true) {
    chatArea.scrollTo({
      top: chatArea.scrollHeight,
      behavior: smooth ? 'smooth' : 'auto'
    });
  }

  function hideWelcome() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
  }

  function escapeHTML(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function getTime() {
    return new Date().toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit'
    });
  }

  const SCALE_SVG = `
    <svg viewBox="0 0 24 24"
         fill="none"
         stroke="currentColor"
         stroke-width="2"
         stroke-linecap="round"
         stroke-linejoin="round"
         style="width:14px;height:14px;">
      <line x1="3" y1="21" x2="21" y2="21"/>
      <line x1="12" y1="3" x2="12" y2="21"/>
      <path d="M5 9l3 5H5l3-5z"/>
      <path d="M16 9l3 5h-3l3-5z"/>
      <line x1="5" y1="9" x2="19" y2="9"/>
      <line x1="8" y1="3" x2="16" y2="3"/>
    </svg>
  `;

  /* ─────────────────────────────
     CONVERSATIONS
  ───────────────────────────── */
  function addConvoItem(text) {
    const title = text.length > 34
      ? text.slice(0, 34) + '…'
      : text;

    document.querySelectorAll('.convo-item')
      .forEach((item) => item.classList.remove('active'));

    const item = document.createElement('div');

    item.className = 'convo-item active';

    item.innerHTML = `
      <svg fill="none" stroke="currentColor"
           stroke-width="2"
           viewBox="0 0 24 24"
           style="width:14px;height:14px;">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>${escapeHTML(title)}</span>
    `;

    convoList.insertBefore(item, convoList.firstChild);
  }

  /* ─────────────────────────────
     MESSAGES
  ───────────────────────────── */
  function appendUserMessage(text) {
    hideWelcome();

    const msg = document.createElement('div');
    msg.className = 'message user';

    msg.innerHTML = `
      <div class="msg-header">
        <div class="msg-avatar">U</div>
        <span class="msg-sender">You</span>
        <span style="font-size:11px;color:var(--text-muted);margin-left:auto;">
          ${getTime()}
        </span>
      </div>

      <div class="msg-body">
        ${escapeHTML(text)}
      </div>
    `;

    chatArea.appendChild(msg);
    scrollBottom();
  }

  function appendBotMessage(text, lang = 'en') {
    const label =
      lang === 'ur'
        ? 'Legal_Chatbot · اردو'
        : 'Legal_Chatbot';

    const msg = document.createElement('div');
    msg.className = 'message bot';

    msg.innerHTML = `
      <div class="msg-header">
        <div class="msg-avatar">${SCALE_SVG}</div>

        <span class="msg-sender">
          Legal_Chatbot
        </span>

        <span style="font-size:11px;color:var(--text-muted);margin-left:auto;">
          ${getTime()}
        </span>
      </div>

      <div class="bot-label">
        <span class="label-dot"></span>
        ${escapeHTML(label)}
      </div>

      <div class="msg-body">
        ${escapeHTML(text)}
      </div>
    `;

    chatArea.appendChild(msg);
    scrollBottom();
  }

  /* ─────────────────────────────
     TYPING INDICATOR
  ───────────────────────────── */
  function showTyping() {
    hideWelcome();

    removeTyping();

    const typing = document.createElement('div');

    typing.id = 'typingRow';
    typing.className = 'typing-row';

    typing.innerHTML = `
      <div class="msg-avatar"
           style="
             width:30px;
             height:30px;
             border-radius:50%;
             background:var(--accent);
             color:#fff;
             display:grid;
             place-items:center;
             flex-shrink:0;
           ">
        ${SCALE_SVG}
      </div>

      <div class="typing-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    `;

    chatArea.appendChild(typing);
    scrollBottom();
  }

  function removeTyping() {
    const old = document.getElementById('typingRow');
    if (old) old.remove();
  }

  /* ─────────────────────────────
     BUTTON STATES
  ───────────────────────────── */
  function setLoading(state) {
    isSending = state;

    sendBtn.disabled = state;
    messageInput.disabled = state;

    if (state) {
      sendBtn.style.opacity = '0.7';
    } else {
      sendBtn.style.opacity = '1';
    }
  }

  /* ─────────────────────────────
     SEND MESSAGE
  ───────────────────────────── */
  async function sendMessage() {
    const text = messageInput.value.trim();

    if (!text || isSending) return;

    if (convoCount === 0) {
      addConvoItem(text);
    }

    convoCount++;

    appendUserMessage(text);

    messageInput.value = '';
    messageInput.style.height = 'auto';

    setLoading(true);

    showTyping();

    currentController = new AbortController();

    try {
      const timeout = setTimeout(() => {
        currentController.abort();
      }, 120000);

      const response = await fetch('/chat', {
        method: 'POST',

        headers: {
          'Content-Type': 'application/json'
        },

        body: JSON.stringify({
          message: text
        }),

        signal: currentController.signal
      });

      clearTimeout(timeout);

      const data = await response.json();

      removeTyping();

      if (!response.ok) {
        appendBotMessage(
          data.error || 'Server error occurred.',
          'en'
        );
      } else {
        appendBotMessage(
          data.reply,
          data.language || 'en'
        );
      }

    } catch (error) {

      removeTyping();

      if (error.name === 'AbortError') {
        appendBotMessage(
          'Request timed out. The model may be processing a large response.',
          'en'
        );
      } else {
        appendBotMessage(
          'Unable to connect to Flask server.',
          'en'
        );
      }

    } finally {

      setLoading(false);

      messageInput.focus();

      currentController = null;
    }
  }

  /* ─────────────────────────────
     INPUT EVENTS
  ───────────────────────────── */
  sendBtn.addEventListener('click', sendMessage);

  messageInput.addEventListener('keydown', (e) => {

    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  messageInput.addEventListener('input', () => {

    messageInput.style.height = 'auto';

    messageInput.style.height =
      Math.min(messageInput.scrollHeight, 140) + 'px';
  });

  /* ─────────────────────────────
     NEW CHAT
  ───────────────────────────── */
  function buildWelcome() {
    return `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          ${SCALE_SVG}
        </div>

        <h2>Ask a legal question</h2>

        <p>
          The assistant answers only from the indexed Pakistani legal dataset.
          English and Urdu queries are both supported.
        </p>

        <div class="chips">
          <button class="chip"
            data-q="What limitations are imposed on freedom of expression?">
            Freedom of expression
          </button>

          <button class="chip"
            data-q="آزادیِ اظہار پر کون سی پابندیاں عائد کی گئی ہیں؟">
            Urdu legal query
          </button>

          <button class="chip"
            data-q="What is the procedure for filing a petition?">
            Filing a petition
          </button>

          <button class="chip"
            data-q="What are the fundamental rights in Pakistan's constitution?">
            Fundamental rights
          </button>
        </div>
      </div>
    `;
  }

  function resetChat() {

    if (currentController) {
      currentController.abort();
    }

    chatArea.innerHTML = buildWelcome();

    bindChips();

    convoCount = 0;
  }

  newChatBtn.addEventListener('click', () => {

    resetChat();

    document.querySelectorAll('.convo-item')
      .forEach((item) => item.classList.remove('active'));

    const item = document.createElement('div');

    item.className = 'convo-item active';

    item.innerHTML = `
      <svg fill="none" stroke="currentColor"
           stroke-width="2"
           viewBox="0 0 24 24"
           style="width:14px;height:14px;">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>

      <span>New Conversation</span>
    `;

    convoList.insertBefore(item, convoList.firstChild);

    messageInput.focus();
  });

  clearAllBtn.addEventListener('click', () => {

    convoList.innerHTML = '';

    resetChat();

    messageInput.focus();
  });

  /* ─────────────────────────────
     CHIPS
  ───────────────────────────── */
  function bindChips() {

    document.querySelectorAll('.chip')
      .forEach((chip) => {

        chip.addEventListener('click', () => {

          messageInput.value = chip.dataset.q;

          messageInput.dispatchEvent(new Event('input'));

          sendMessage();
        });
      });
  }

  bindChips();

  /* ─────────────────────────────
     SERVER HEALTH CHECK
  ───────────────────────────── */
  async function checkServer() {

    try {

      const res = await fetch('/health');

      if (!res.ok) {
        throw new Error();
      }

    } catch {

      appendBotMessage(
        'Flask backend is not responding.',
        'en'
      );
    }
  }

  /* ─────────────────────────────
     INIT
  ───────────────────────────── */
  window.addEventListener('load', () => {
    checkServer();
    messageInput.focus();
  });

</script>
